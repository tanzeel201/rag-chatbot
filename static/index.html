<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RAG Chatbot — Document Q&A</title>
<style>
  :root {
    --bg: #0f1b1a;
    --panel: #16302c;
    --panel-light: #1c3d37;
    --text: #eef4f1;
    --muted: #9db3ac;
    --accent: #e8a33d;
    --accent-dim: #a9762b;
    --border: #274942;
    --mono: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
    --sans: "IBM Plex Sans", -apple-system, Segoe UI, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  header .brand {
    font-family: var(--mono);
    font-size: 15px;
    letter-spacing: 0.06em;
    color: var(--accent);
  }
  header .brand span { color: var(--muted); }
  header .status {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }
  .layout {
    flex: 1;
    display: grid;
    grid-template-columns: 280px 1fr;
    overflow: hidden;
  }
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 20px;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
  }
  .sidebar h2 {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin: 0 0 4px;
  }
  .dropzone {
    border: 1px dashed var(--border);
    border-radius: 6px;
    padding: 18px 14px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  .dropzone:hover { border-color: var(--accent-dim); color: var(--text); }
  .file-list { list-style: none; margin: 0; padding: 0; font-family: var(--mono); font-size: 12px; }
  .file-list li {
    padding: 6px 8px;
    border-radius: 4px;
    background: var(--panel-light);
    margin-bottom: 6px;
    color: var(--text);
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .file-list li .badge { color: var(--accent); }
  .chat {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .msg { max-width: 680px; display: flex; flex-direction: column; gap: 6px; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot { align-self: flex-start; align-items: flex-start; }
  .msg .role {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .msg .bubble {
    padding: 12px 16px;
    border-radius: 10px;
    line-height: 1.5;
    font-size: 14px;
  }
  .msg.user .bubble { background: var(--accent); color: #1a1305; border-bottom-right-radius: 2px; }
  .msg.bot .bubble { background: var(--panel-light); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
  .sources {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .source-chip {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 100px;
  }
  .composer {
    border-top: 1px solid var(--border);
    padding: 16px 28px 22px;
    display: flex;
    gap: 10px;
  }
  .composer input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: var(--sans);
  }
  .composer input:focus { outline: none; border-color: var(--accent-dim); }
  .composer button {
    background: var(--accent);
    color: #1a1305;
    border: none;
    border-radius: 8px;
    padding: 0 20px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .composer button:disabled { opacity: 0.5; cursor: not-allowed; }
  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    max-width: 360px;
  }
  .empty-state .glyph { font-family: var(--mono); font-size: 28px; color: var(--accent); margin-bottom: 10px; }
</style>
</head>
<body>
  <header>
    <div class="brand">rag-chatbot<span>/document-qa</span></div>
    <div class="status" id="status">checking backend…</div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <h2>Documents</h2>
      <label class="dropzone" for="fileInput">
        Drop files or click to upload<br />(.pdf · .txt · .md)
      </label>
      <input id="fileInput" type="file" multiple accept=".pdf,.txt,.md" style="display:none" />
      <ul class="file-list" id="fileList"></ul>
    </aside>

    <main class="chat">
      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <div class="glyph">⌁</div>
          Upload a document, then ask a question about it. Answers are grounded
          in your files and cite the source chunks used.
        </div>
      </div>
      <div class="composer">
        <input id="questionInput" type="text" placeholder="Ask something about your documents…" />
        <button id="sendBtn">Ask</button>
      </div>
    </main>
  </div>

<script>
  const API_BASE = "";
  const messagesEl = document.getElementById("messages");
  const emptyState = document.getElementById("emptyState");
  const fileInput = document.getElementById("fileInput");
  const fileList = document.getElementById("fileList");
  const statusEl = document.getElementById("status");
  const questionInput = document.getElementById("questionInput");
  const sendBtn = document.getElementById("sendBtn");

  async function checkHealth() {
    try {
      const res = await fetch(`${API_BASE}/health`);
      const data = await res.json();
      statusEl.textContent = `● online — ${data.documents_indexed} chunks indexed`;
    } catch {
      statusEl.textContent = "● backend unreachable";
    }
  }

  fileInput.addEventListener("change", async () => {
    const files = Array.from(fileInput.files);
    if (!files.length) return;

    const form = new FormData();
    files.forEach((f) => form.append("files", f));

    statusEl.textContent = "● indexing…";
    const res = await fetch(`${API_BASE}/ingest`, { method: "POST", body: form });
    const data = await res.json();

    data.files_indexed.forEach((name) => {
      const li = document.createElement("li");
      li.innerHTML = `<span>${name}</span><span class="badge">indexed</span>`;
      fileList.appendChild(li);
    });
    checkHealth();
  });

  function addMessage(role, text, sources = []) {
    emptyState.remove();
    const wrap = document.createElement("div");
    wrap.className = `msg ${role}`;
    const roleLabel = role === "user" ? "You" : "Assistant";
    wrap.innerHTML = `
      <div class="role">${roleLabel}</div>
      <div class="bubble">${text}</div>
    `;
    if (sources.length) {
      const srcWrap = document.createElement("div");
      srcWrap.className = "sources";
      sources.forEach((s) => {
        const chip = document.createElement("span");
        chip.className = "source-chip";
        chip.textContent = s.page != null ? `${s.source} · p.${s.page + 1}` : s.source;
        srcWrap.appendChild(chip);
      });
      wrap.appendChild(srcWrap);
    }
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function ask() {
    const question = questionInput.value.trim();
    if (!question) return;
    addMessage("user", question);
    questionInput.value = "";
    sendBtn.disabled = true;

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question, session_id: "demo" }),
      });
      const data = await res.json();
      addMessage("bot", data.answer, data.sources || []);
    } catch (err) {
      addMessage("bot", "Something went wrong reaching the backend.");
    } finally {
      sendBtn.disabled = false;
    }
  }

  sendBtn.addEventListener("click", ask);
  questionInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") ask();
  });

  checkHealth();
</script>
</body>
</html>
